services:
  db:
    image: postgres:16-alpine
    container_name: ai-pr-reviewer-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: ai_pr_reviewer
    command:
      - "postgres"
      - "-c"
      - "max_connections=10"
      - "-c"
      - "shared_buffers=16MB"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
